<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows Desktop Mimic</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="./favicon/site.webmanifest" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="desktop-container">
        <section class="desktop">
          <div class="desktop-bg"></div>
        </section>
        <section class="taskbar">
          <div class="start">
            <button type="button" class="start-btn">
              <i class="ri-microsoft-fill"></i>
            </button>
            <div class="search">
              <i class="ri-search-line"></i>
              <input type="text" class="search-bar" id="search-bar" placeholder="Search"/>
            </div>
            <div class="task-view">
              <img src="./images/task-View.png" alt="" />
            </div>
            <ul class="pinned-apps">
              <li class="apps"><img src="./images/folder.png" alt="" /></li>
              <li class="apps"><img src="./images/brave.png" alt="" /></li>
            </ul>
          </div>
          <div class="action">
            <button type="button" class="hiddenTray-btn" id="hiddenTray-btn">
              <i class="ri-arrow-drop-down-line"></i>
            </button>
            <ul class="action-center">
              <li class="action-item wifi"><img src="" alt="" /></li>
              <li class="action-item sound"><img src="" alt="" /></li>
              <li class="action-item battery"><img src="" alt="" /></li>
            </ul>
            <div class="time-date">
              <p class="time">time</p>
              <p class="date">date</p>
            </div>
            <div class="minimize">
              
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
